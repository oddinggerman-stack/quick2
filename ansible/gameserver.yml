---
- name: Configureer Powerplay gameservers
  hosts: gameservers
  become: yes

  vars:
    game_data_mount: /mnt/gamedata
    game_port: 7777

  tasks:
    - name: Wacht tot SSH beschikbaar is
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 120

    - name: Verzamel facts
      ansible.builtin.gather_facts:

    # ── Disk configuratie ──────────────────────────────────────────────────
    - name: Controleer of data disk al geformateerd is
      ansible.builtin.command: blkid /dev/sdc
      register: blkid_result
      failed_when: false
      changed_when: false

    - name: Formatteer data disk (ext4) als nog niet geformateerd
      ansible.builtin.filesystem:
        fstype: ext4
        dev: /dev/sdc
      when: blkid_result.rc != 0

    - name: Maak mount point aan
      ansible.builtin.file:
        path: "{{ game_data_mount }}"
        state: directory
        mode: '0755'

    - name: Mount data disk permanent via fstab
      ansible.posix.mount:
        path: "{{ game_data_mount }}"
        src: /dev/sdc
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    # ── Packages ───────────────────────────────────────────────────────────
    - name: Installeer benodigde packages
      ansible.builtin.apt:
        name:
          - ufw
          - cifs-utils
          - htop
        state: present
        update_cache: yes

    # ── Firewall (UFW) ─────────────────────────────────────────────────────
    - name: Sta SSH toe vanuit management subnet
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
        src: '10.1.3.0/26'

    - name: Sta UDP game verkeer toe
      community.general.ufw:
        rule: allow
        port: '{{ game_port }}'
        proto: udp

    - name: Sta TCP game verkeer toe
      community.general.ufw:
        rule: allow
        port: '{{ game_port }}'
        proto: tcp

    - name: Sta HTTPS outbound toe
      community.general.ufw:
        rule: allow
        direction: out
        port: '443'
        proto: tcp

    - name: Activeer UFW
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # ── Docker health check ────────────────────────────────────────────────
    - name: Controleer of Docker actief is
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    # ── Verificatie ────────────────────────────────────────────────────────
    - name: Toon disk mount status
      ansible.builtin.command: df -h {{ game_data_mount }}
      register: df_output
      changed_when: false

    - name: Print disk status
      ansible.builtin.debug:
        msg: "{{ df_output.stdout }}"
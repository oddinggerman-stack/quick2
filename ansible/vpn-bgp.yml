---
- name: Configureer FRR BGP op Azure VPN router
  hosts: vpn
  become: yes

  vars:
    bgp_local_as: 65002
    bgp_peer_as: 65001
    bgp_router_id: "10.1.5.4"
    bgp_peer_ip: "192.168.1.1"
    bgp_local_prefix: "10.1.0.0/28"
    bgp_peer_description: "Skylab-pfSense"
    ipsec_static_route_enabled: false
    ipsec_route_cidr: ""
    ipsec_route_gateway: ""
    ipsec_route_interface: ""

  tasks:
    - name: of FRR geinstalleerd is
      ansible.builtin.package:
        name:
          - frr
          - frr-pythontools
        state: present

    - name: Activeer BGP in FRR
      ansible.builtin.lineinfile:
        path: /etc/frr/daemons
        regexp: '^bgpd='
        line: 'bgpd=yes'
      notify: restart frr

    - name: Deploy FRR BGP configuratie met een template
      ansible.builtin.template:
        src: frr.conf.j2
        dest: /etc/frr/frr.conf
        owner: frr
        group: frr
        mode: '0640'
      notify: restart frr

    - name: Voeg optionele statische IPsec route toe
      ansible.builtin.command:
        cmd: >-
          ip route replace {{ ipsec_route_cidr }} via {{ ipsec_route_gateway }}{% if ipsec_route_interface | length > 0 %} dev {{ ipsec_route_interface }}{% endif %}
      when:
        - ipsec_static_route_enabled | bool
        - ipsec_route_cidr | length > 0
        - ipsec_route_gateway | length > 0

    - name: checkt BGP status
      ansible.builtin.command: vtysh -c "show bgp summary"
      register: bgp_status
      changed_when: false

  handlers:
    - name: restart frr
      ansible.builtin.systemd:
        name: frr
        state: restarted
        enabled: yes
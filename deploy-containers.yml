---
- hosts: dockerhosts
  become: yes

  tasks:
    - name: Installeer Python Docker module
      ansible.builtin.pip:
        name: docker
        state: present

    - name: Start Nginx container op poort 80
      community.docker.docker_container:
        name: nginx-web
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "80:80"
        volumes:
          - /var/www/html:/usr/share/nginx/html:ro

    - name: Maak webroot directory aan
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Plaats een eigen indexpagina
      ansible.builtin.copy:
        content: |
          <html>
          <body>
          <h1>Container op {{ inventory_hostname }}</h1>
          <p>Deze Nginx container draait op een Azure VM en is gedeployed met Ansible.</p>
          <p>Host: {{ ansible_hostname }}</p>
          </body>
          </html>
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"
